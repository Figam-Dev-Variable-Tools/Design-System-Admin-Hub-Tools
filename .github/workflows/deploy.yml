# ==============================================================================
# Deploy — main 머지 시 Storybook 정적 배포(GitHub Pages) + Admin 앱 빌드 아티팩트
#
# 원칙: **배포는 게이트 통과의 '결과'이지 별도 경로가 아니다.**
#   - 배포 job 은 `needs:` 로 검증 job 에 매달려 있다. 게이트를 통과하지 않으면
#     배포 스텝에 **도달할 수 없다**. "배포는 급하니 검사 생략"은 존재하지 않는 경로다.
#   - 워크플로우 간에는 `needs:` 를 걸 수 없으므로, 이 워크플로우가 PR 게이트와
#     **동일한 검사 집합**을 선행 job(`gates`, `a11y`)으로 다시 실행한다.
#     (pr-gates.yml 의 `boundary` 는 PR base 대비 diff 검사라 push 트리거에서는 대상이 아니다)
#
# 게이트 override 는 A00만이 할 수 있고 ADR 기록 + 기술부채 티켓이 필수다.
# 이 워크플로우에는 우회 경로(continue-on-error · if 스킵 · || true)가 **0건**이다.
# ==============================================================================
name: Deploy (main)

on:
  push:
    branches: [main]
  workflow_dispatch: # 재배포 — 단, gates 를 다시 통과해야 한다 (우회 아님)

# 최소 권한 (기본 read). Pages 배포 job 에서만 write 로 승격한다.
permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false # 배포는 중간에 끊지 않는다

jobs:
  # ── 게이트 재검증 — PR 게이트와 동일 검사 집합 ────────────────────────────
  gates:
    name: 게이트 재검증 (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true # 하나라도 깨지면 배포 경로를 즉시 닫는다
      matrix:
        check:
          - validate:registry # A02
          - validate:contracts # A18/A19
          - codegen:check # codegen 생성물 최신성
          - contract-test # A74 (G5·G6·G7)
          - naming:check # A76
          - lint # A81
          - format:check # A81
          - quality:check # A83 (클린코드 6축)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 패키지 소스가 generated 타입/토큰에 의존하므로 codegen 선행 필수
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - run: pnpm ${{ matrix.check }}

  # ── 접근성 감사 (A72) — Storybook 빌드가 필요해 별도 job ──────────────────
  a11y:
    name: 접근성 감사 (Storybook test-runner + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Playwright 브라우저 설치 (test-runner 실행 환경)
        run: pnpm --filter @tds/a11y exec playwright install --with-deps chromium
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: Storybook 정적 빌드
        run: pnpm sb:build
      - run: pnpm a11y

  # ── Storybook 정적 빌드 → Pages 아티팩트 ─────────────────────────────────
  build-storybook:
    name: Storybook 빌드 (Pages 아티팩트)
    needs: [gates, a11y] # 게이트 통과 없이는 여기 도달할 수 없다
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - uses: actions/configure-pages@v5
      - name: Storybook 정적 빌드
        run: pnpm sb:build
      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ui/storybook-static

  # ── GitHub Pages 배포 ────────────────────────────────────────────────────
  deploy-storybook:
    name: Storybook 배포 (GitHub Pages)
    needs: build-storybook
    runs-on: ubuntu-latest
    permissions:
      pages: write # Pages 배포에 필요
      id-token: write # OIDC — deploy-pages 가 요구
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Admin 앱 빌드 아티팩트 ───────────────────────────────────────────────
  build-admin:
    name: Admin 앱 빌드 아티팩트
    needs: [gates, a11y] # 배포물은 게이트 통과의 결과다
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: Admin 앱 빌드 (tsc --noEmit && vite build)
        run: pnpm --filter @tds/admin run build
      - name: Admin 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist-${{ github.sha }}
          path: apps/admin/dist/
          if-no-files-found: error # 산출물이 없는데 성공으로 넘기지 않는다
          retention-days: 30
